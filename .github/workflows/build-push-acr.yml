name: Build and Push to ACR

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Backend image
        uses: docker/build-push-action@v3
        with:
          context: .
          push: true
          tags: ${{ secrets.ACR_LOGIN_SERVER }}/sentrydash-backend:latest, ${{ secrets.ACR_LOGIN_SERVER }}/sentrydash-backend:${{ github.sha }}
          file: ./Dockerfile

      - name: Build and push Frontend image
        uses: docker/build-push-action@v3
        with:
          context: ./sentrydash-frontend
          push: true
          tags: ${{ secrets.ACR_LOGIN_SERVER }}/sentrydash-frontend:latest, ${{ secrets.ACR_LOGIN_SERVER }}/sentrydash-frontend:${{ github.sha }}
          file: ./sentrydash-frontend/Dockerfile
